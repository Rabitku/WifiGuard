name: WiFiGuard Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # Run only the automated tests; do not run the WiFiGuard CLI scan.
      - name: Run tests
        run: python -m pytest
